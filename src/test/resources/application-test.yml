spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fleetwise}
    username: ${SPRING_DATASOURCE_USERNAME:fleetwise}
    password: ${SPRING_DATASOURCE_PASSWORD:fleetwise}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration

openai:
  enabled: false
  api-key: test-key
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini

telematics:
  geometris:
    api-key: ${GEOMETRIS_API_KEY:test-geometris-key}

email:
  enabled: ${EMAIL_ENABLED:false}
  provider: resend
  from: ${EMAIL_FROM:noreply@trackora.solutions}
  resend:
    api-key: ${RESEND_API_KEY:dummy-resend-key}

jwt:
  secret: ${JWT_SECRET:trackora-test-jwt-secret-must-be-at-least-32-characters-long-123456}
  expiration-minutes: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      tags:
        application: trackora-api

azure:
  servicebus:
    enabled: ${AZURE_SERVICE_BUS_ENABLED:false}
    connection-string: ${AZURE_SERVICE_BUS_CONNECTION_STRING:dummy-az-service-bus}
    queue-name: geometris-raw-packets

  # reduce log noise during test runs
  main:
    banner-mode: off
  logging:
    level:
      root: WARN
      org.springframework.test.context: INFO
      com.fleetwise: DEBUG

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs

swagger:
  api-key: test-swagger-key