server:
  port: 8080

spring:
  application:
    name: fleetwise-api

  datasource:
    url: jdbc:postgresql://localhost:5432/fleetwise
    username: fleetwise
    password: fleetwise

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  logging:
    level:
      org.hibernate.SQL: INFO
      org.hibernate.orm.jdbc.bind: INFO

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:dummy-jwt-key}
  expiration-minutes: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info

openai:
  enabled: ${OPENAI_ENABLED:false}
  api-key: ${OPENAI_API_KEY:dummy-key}
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini

fleetwise:
  uploads-dir: ${FLEETWISE_UPLOADS_DIR:uploads}

springdoc:
  swagger:
    api-key: ${SWAGGER_API_KEY:dev-swagger-key}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs