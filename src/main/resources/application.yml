server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: fleetwise-api
  datasource:
    url: jdbc:postgresql://localhost:5432/fleetwise
    username: fleetwise
    password: fleetwise
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  logging:
    level:
      org.hibernate.SQL: INFO
      org.hibernate.orm.jdbc.bind: INFO
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

telematics:
  geometris:
    api-key: ${GEOMETRIS_API_KEY:test-geometris-key}

jwt:
  secret: ${JWT_SECRET:trackora-local-jwt-secret-must-be-at-least-32-characters-long-123456}
  expiration-minutes: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      tags:
        application: trackora-api

openai:
  enabled: ${OPENAI_ENABLED:false}
  api-key: ${OPENAI_API_KEY:dummy-key}
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini

fleetwise:
  uploads-dir: ${FLEETWISE_UPLOADS_DIR:uploads}

internal:
  api-key: ${INTERNAL_API_KEY:dev-internal-key}

storage:
  provider: ${STORAGE_PROVIDER:local}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:trackora-documents}
    region: ${AWS_REGION:us-east-1}

azure:
  servicebus:
    enabled: ${AZURE_SERVICE_BUS_ENABLED:false}
    connection-string: ${AZURE_SERVICE_BUS_CONNECTION_STRING}
    queue-name: geometris-raw-packets

email:
  enabled: ${EMAIL_ENABLED:true}
  provider: resend
  from: ${EMAIL_FROM:noreply@trackora.solutions}
  resend:
    api-key: ${RESEND_API_KEY:dummy_resend_key}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs

swagger:
  api-key: ${SWAGGER_API_KEY:dev-swagger-key}