name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fleetwise
          POSTGRES_USER: fleetwise
          POSTGRES_PASSWORD: fleetwise
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fleetwise -d fleetwise"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew clean test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/fleetwise
          SPRING_DATASOURCE_USERNAME: fleetwise
          SPRING_DATASOURCE_PASSWORD: fleetwise
          JWT_SECRET: ${{secrets.JWT_SECRET}}
          OPENAI_ENABLED: false
          OPENAI_API_KEY: dummy-key
          SWAGGER_ENABLED: true
          SWAGGER_API_KEY: ci-swagger-key