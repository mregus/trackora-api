name: Generate Alerts

on:
  schedule:
    - cron: '0 10 * * *' # 6 AM Eastern during EDT
  workflow_dispatch:

jobs:
  generate-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Generate production alerts
        run: |
          curl -X POST \
            https://trackora-api-cxjn.onrender.com/api/internal/alerts/generate \
            -H "X-INTERNAL-API-KEY: ${{ secrets.INTERNAL_API_KEY }}"